[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm install --include=dev"
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan config:clear && php artisan config:cache && rm -f /app/database/database.sqlite && touch /app/database/database.sqlite && php artisan migrate --force && php artisan db:seed --force && php artisan serve --host=0.0.0.0 --port=$PORT"
